<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Family Life | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/member.css">
</head>
<body>
    <nav class="navbar navbar-expand bg-white border-bottom sticky-top">
        <div class="container">
            <span class="navbar-brand fw-semibold">Family Life</span>
            <div class="ms-auto d-flex align-items-center gap-2">
                <a href="/index.php" class="btn btn-sm btn-outline-secondary">Start Page</a>
                <button id="logoutBtn" class="btn btn-sm btn-outline-danger" type="button">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div id="authError" class="alert alert-warning d-none" role="alert"></div>

        <section class="card shadow-sm mb-4">
            <div class="card-body d-flex justify-content-between align-items-start gap-3 flex-wrap">
                <div>
                    <h1 class="h4 mb-2">Member Dashboard</h1>
                    <p id="memberSummary" class="mb-0 text-muted">Loading profile...</p>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <button id="copyLinkBtn" class="btn btn-sm btn-outline-secondary" type="button">Copy Access Link</button>
                    <a id="addMemberLink" href="/add-member.html" class="btn btn-sm btn-outline-primary">+ Add Member</a>
                </div>
            </div>
        </section>

        <div class="row g-4">
            <div class="col-lg-6">
                <section class="card shadow-sm h-100">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h2 class="h6 mb-0">Current Claims</h2>
                        <button id="refreshClaimsBtn" class="btn btn-sm btn-outline-primary" type="button">Refresh</button>
                    </div>
                    <div class="card-body">
                        <div id="claimsContainer" class="table-responsive"></div>
                    </div>
                </section>
            </div>

            <div class="col-lg-6">
                <section class="card shadow-sm h-100">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h2 class="h6 mb-0">Family Scoreboard</h2>
                        <button id="refreshScoreboardBtn" class="btn btn-sm btn-outline-primary" type="button">Refresh</button>
                    </div>
                    <div class="card-body">
                        <div id="scoreboardContainer" class="table-responsive"></div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="/js/auth.js" defer></script>
    <script src="/js/dashboard.js" defer></script>
</body>
</html>
