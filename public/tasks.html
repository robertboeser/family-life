<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Family Life | Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/member.css">
</head>
<body>
    <nav class="navbar navbar-expand bg-white border-bottom sticky-top">
        <div class="container">
            <span class="navbar-brand fw-semibold">Family Life</span>
            <div class="ms-auto d-flex align-items-center gap-2">
                <a href="/index.html" class="btn btn-sm btn-outline-secondary">Start Page</a>
                <button id="logoutBtn" class="btn btn-sm btn-outline-danger" type="button">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div id="authError" class="alert alert-warning d-none" role="alert"></div>

        <section class="card shadow-sm mb-4">
            <div class="card-body d-flex justify-content-between align-items-start gap-3 flex-wrap">
                <div>
                    <a id="backBtn" href="/dashboard.html" class="btn btn-sm btn-outline-secondary mb-3">← Back to Dashboard</a>
                    <h1 class="h4 mb-2">Family Tasks</h1>
                    <p id="familyInfo" class="mb-0 text-muted">Loading family info...</p>
                </div>
                <button id="showCreateTaskBtn" class="btn btn-sm btn-outline-primary" type="button">+ Create New Task</button>
            </div>
        </section>

        <section id="createTaskCard" class="card shadow-sm mb-4 d-none">
            <div class="card-header bg-white">
                <h2 class="h6 mb-0">Create Task</h2>
            </div>
            <div class="card-body">
                <form id="createTaskForm" class="row g-3" novalidate>
                    <div class="col-md-8">
                        <label for="taskName" class="form-label">Task name</label>
                        <input id="taskName" type="text" class="form-control" placeholder="Clean kitchen" required>
                    </div>
                    <div class="col-md-4">
                        <label for="taskPoints" class="form-label">Points</label>
                        <input id="taskPoints" type="number" class="form-control" min="1" step="1" value="10" required>
                    </div>
                    <div class="col-12 d-flex flex-column flex-md-row gap-2">
                        <button id="createTaskSubmitBtn" class="btn btn-primary" type="submit">Create Task</button>
                        <button id="cancelCreateTaskBtn" class="btn btn-outline-secondary" type="button">Cancel</button>
                    </div>
                </form>
                <div id="status" class="alert d-none mt-3 mb-0" role="alert"></div>
            </div>
        </section>

        <section class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h2 class="h6 mb-0">All Family Tasks</h2>
                <button id="refreshTasksBtn" class="btn btn-sm btn-outline-primary" type="button">Refresh</button>
            </div>
            <div class="card-body">
                <div id="tasksContainer" class="table-responsive"></div>
            </div>
        </section>
    </main>

    <script src="/js/auth.js" defer></script>
    <script src="/js/tasks.js" defer></script>
</body>
</html>
