<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Family Life | Add Member</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/member.css">
</head>
<body>
    <nav class="navbar navbar-expand bg-white border-bottom sticky-top">
        <div class="container">
            <span class="navbar-brand fw-semibold">Family Life</span>
            <div class="ms-auto d-flex align-items-center gap-2">
                <a href="/index.html" class="btn btn-sm btn-outline-secondary">Start Page</a>
                <button id="logoutBtn" class="btn btn-sm btn-outline-danger" type="button">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div id="authError" class="alert alert-warning d-none" role="alert"></div>

        <section class="card shadow-sm mb-4">
            <div class="card-body">
                <a id="backBtn" href="/dashboard.html" class="btn btn-sm btn-outline-secondary mb-3">← Back to Dashboard</a>
                <h1 class="h4 mb-2">Add New Member</h1>
                <p id="familyInfo" class="mb-0 text-muted">Loading family info...</p>
            </div>
        </section>

        <div class="row justify-content-center">
            <div class="col-lg-6">
                <section class="card shadow-sm">
                    <div class="card-body p-4">
                        <form id="addMemberForm" class="g-3" novalidate>
                            <div class="mb-3">
                                <label for="memberName" class="form-label">Member name</label>
                                <input id="memberName" type="text" class="form-control" placeholder="Jordan" required>
                            </div>
                            <div class="d-flex flex-column flex-md-row gap-2">
                                <button id="submitBtn" class="btn btn-primary" type="submit">Add Member</button>
                                <a id="cancelBtn" href="/dashboard.html" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>

                        <div id="status" class="alert d-none mt-3 mb-0" role="alert"></div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="/js/auth.js" defer></script>
    <script src="/js/add-member.js" defer></script>
</body>
</html>
