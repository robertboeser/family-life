<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Family Life | Voting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/member.css">
</head>
<body>
    <nav class="navbar navbar-expand bg-white border-bottom sticky-top">
        <div class="container">
            <span class="navbar-brand fw-semibold">Family Life</span>
            <div class="ms-auto d-flex align-items-center gap-2">
                <a href="/index.html" class="btn btn-sm btn-outline-secondary">Start Page</a>
                <button id="logoutBtn" class="btn btn-sm btn-outline-danger" type="button">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div id="authError" class="alert alert-warning d-none" role="alert"></div>

        <section class="card shadow-sm mb-4">
            <div class="card-body d-flex justify-content-between align-items-start gap-3 flex-wrap">
                <div>
                    <a id="backBtn" href="/dashboard.html" class="btn btn-sm btn-outline-secondary mb-3">← Back to Dashboard</a>
                    <h1 class="h4 mb-2">Voting</h1>
                    <p id="votingSummary" class="mb-0 text-muted">Loading voting info...</p>
                </div>
                <div class="d-flex align-items-center gap-2 flex-wrap justify-content-end">
                    <span id="votingBalance" class="badge text-bg-light border text-dark px-3 py-2">Usable points: ...</span>
                    <button id="showCreateWishBtn" class="btn btn-sm btn-outline-primary d-none" type="button">+ Create Wish</button>
                </div>
            </div>
        </section>

        <section id="createWishCard" class="card shadow-sm mb-4 d-none">
            <div class="card-header bg-white">
                <h2 class="h6 mb-0">Create Wish</h2>
            </div>
            <div class="card-body">
                <form id="createWishForm" class="row g-3" novalidate>
                    <div class="col-12">
                        <label for="wishName" class="form-label">Wish name</label>
                        <input id="wishName" type="text" class="form-control" placeholder="Cinema night" required>
                    </div>
                    <div class="col-12 d-flex flex-column flex-md-row gap-2">
                        <button id="createWishSubmitBtn" class="btn btn-primary" type="submit">Create Wish</button>
                        <button id="cancelCreateWishBtn" class="btn btn-outline-secondary" type="button">Cancel</button>
                    </div>
                </form>
                <div id="wishStatus" class="alert d-none mt-3 mb-0" role="alert"></div>
            </div>
        </section>

        <section class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h2 class="h6 mb-0">Active Wishes</h2>
                <button id="refreshVotingBtn" class="btn btn-sm btn-outline-primary" type="button">Refresh</button>
            </div>
            <div class="card-body">
                <div id="voteStatus" class="alert d-none mb-3" role="alert"></div>
                <div id="wishesContainer" class="table-responsive"></div>
            </div>
        </section>
    </main>

    <script src="/js/auth.js" defer></script>
    <script src="/js/voting.js" defer></script>
</body>
</html>
